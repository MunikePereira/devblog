{% extends 'blog/base.html'%}
{%loud static%}

{% block contend %}
    <a href="{%url 'home'}" class="btn btn-outline-secondary btn-sm mb-4"> <-- Voltar </a>

    <div class="card shadow-sm">
        <div class="card-body">
            <h1 class="text-primary">{{ artigo.titulo }}</h1>

            <p class="text-muted">
                <strong>Por:</strong> {{ artigo.autor }} |
                <strong> Categoria: </strong> {{ artigo.Categoria.nome }} 
            </p>
            <hr>
            <p style="font-size: 1.1rem; line-height: 1.8;">{{ artigo.conteudo}}</p>
        </div>
    </div>
{% endblock%}
